<title>Experience team competency</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root{
  --bg-app:#ffffff; --bg-subtle:#fafafa; --bg-elevated:#f4f4f5; --border:#d4d4d8;
  --text:#09090b; --muted:#52525b; --placeholder:#71717a;

*{box-sizing:border-box}
body{margin:0;background:var(--bg-app);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:24px;letter-spacing:.1px;}
.wrap{max-width:760px;margin:0 auto;padding:24px 20px 64px;}
.head{display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);padding-bottom:16px;}
.dot{width:12px;height:12px;border-radius:3px;background:var(--primary);}
h1{font-size:26px;line-height:34px;font-weight:800;letter-spacing:.2px;margin:0;}
.filters{display:flex;gap:16px;flex-wrap:wrap;margin:20px 0 10px;align-items:flex-end;}
.fld{display:flex;flex-direction:column;gap:8px;}
.fld label{font:700 12px/20px Inter;letter-spacing:.1px;}
.fld select{height:36px;min-width:210px;padding:0 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-app);color:var(--text);font:400 14px/24px Inter;cursor:pointer;}
.fld select:focus{outline:none;border-color:var(--focus);box-shadow:0 0 0 2px var(--focus);}
.domlegend{display:flex;flex-wrap:wrap;gap:14px;margin:4px 0 4px;}
.domlegend span{display:inline-flex;align-items:center;gap:6px;font:700 12px/18px Inter;}
.domlegend i{width:11px;height:11px;border-radius:3px;display:inline-block;}
.hint{color:var(--muted);font-size:12px;line-height:18px;margin:6px 0 0;}
.chartwrap{position:relative;margin-top:4px;}
.tip{position:absolute;display:none;pointer-events:none;width:250px;background:var(--bg-app);border:1px solid var(--border);border-radius:10px;padding:0;overflow:hidden;box-shadow:0 10px 15px -3px rgba(16,24,40,.12),0 4px 6px -4px rgba(16,24,40,.12);z-index:30;}
.tiphead{padding:10px 12px 8px;}
.tiptitle{font:800 13px/17px Inter;}
.tipdom{font:700 11px/16px Inter;}
.tipsum{font:400 11px/15px Inter;color:var(--muted);margin-top:3px;}
.bars{display:flex;align-items:flex-end;gap:3px;height:26px;margin-top:8px;}
.bar{flex:1;border-radius:2px 2px 0 0;}
.tipcur{font:600 11px/15px Inter;padding:8px 12px;color:#fff;}
.detail{margin-top:20px;border-top:1px solid var(--border);padding-top:18px;}
.dhead{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.dtitle{font:800 20px/26px Inter;letter-spacing:.2px;margin:0;}
.badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font:700 11px/16px Inter;}
.ddef{font-size:14px;line-height:22px;margin:8px 0 2px;}
.dsum{font-size:13px;line-height:20px;color:var(--muted);font-style:italic;margin:0 0 4px;}
.clear{background:none;border:none;color:var(--primary);font:600 13px/18px Inter;cursor:pointer;padding:0;}
.dcur{display:flex;align-items:center;gap:12px;margin:14px 0;padding:10px 12px;border-radius:8px;color:#fff;}
.dcur .bars{height:22px;width:80px;margin:0;}
.lv{padding:12px 0;border-bottom:1px solid var(--border);}
.lv:last-child{border-bottom:none;}
.lv.on{margin-left:calc(-1 * ((100vw - 100%) / 2));} /* placeholder, overridden below */
.lvtop{display:flex;align-items:baseline;gap:10px;}
.lvnum{font:800 12px/18px Inter;min-width:74px;}
.lvname{font:700 13px/20px Inter;}
.lvsent{font-size:13.5px;line-height:21px;margin:3px 0 0 84px;}
.lvex{font-size:12.5px;line-height:19px;color:var(--muted);margin:3px 0 0 84px;}
.lvon{border-radius:10px;padding:12px 14px;border-bottom:none;}
.domgroup{padding:10px 0;border-bottom:1px solid var(--border);}
.domgroup:last-child{border-bottom:none;}
.domname{display:inline-flex;align-items:center;gap:6px;font:800 13px/20px Inter;}
.domdot{width:11px;height:11px;border-radius:3px;display:inline-block;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{font:600 11px/16px Inter;padding:5px 11px;border:1px solid var(--border);background:var(--bg-app);color:var(--text);border-radius:999px;cursor:pointer;transition:border-color .12s,color .12s;}
.chip:hover{border-color:var(--primary);color:var(--primary);}
.foot{color:var(--placeholder);font-size:11px;margin-top:28px;line-height:18px;}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg-app);font:600 13px/18px Inter;padding:10px 16px;border-radius:999px;box-shadow:0 10px 15px -3px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:50;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
svg text{cursor:pointer;}
</style>

<script>
const DATA = {"levels": ["Foundation", "Developing", "Proficient", "Advanced", "Leading"], "levelMeaning": ["Can do it with guidance.", "Does it independently on familiar problems.", "Does it consistently and handles unfamiliar problems.", "Elevates the work of others in this area.", "Defines the standard for the organization."], "domains": [{"name": "Product", "color": "#3b82f6", "start": 0, "end": 3}, {"name": "Design", "color": "#eab308", "start": 4, "end": 8}, {"name": "User", "color": "#8b5cf6", "start": 9, "end": 12}, {"name": "Tech", "color": "#10b981", "start": 13, "end": 14}, {"name": "Influence", "color": "#006fad", "start": 15, "end": 18}], "skills": [{"order": 1, "skill": "Domain knowledge", "domain": "Product", "track": "Universal", "definition": "How well you understand your squad's slice of GHN logistics: the operations, actors, and constraints behind the screens.", "summary": "Do you understand how your part of the delivery operation actually works?", "L": ["Knows core logistics terms but needs guidance on how the squad's area works.|understands what COD means but asks how the cash reconciliation flow works.", "Works independently within the squad's area.|handles pickup-scheduling work without needing the operating rules re-explained.", "Fluent in the area and connects it to nearby operations.|sees how a change to pickup windows affects hub sorting downstream.", "Teaches the domain to others and catches flawed assumptions in review.|flags that a proposed flow ignores how rural zones batch deliveries.", "Defines how the team builds and keeps its domain knowledge current.|sets up the shared reference the whole team uses to learn the operation."]}, {"order": 2, "skill": "Product data", "domain": "Product", "track": "Universal", "definition": "Using metrics and instrumentation to understand how the product is performing, and backing design decisions with evidence rather than opinion.", "summary": "Can you find, read, and act on the numbers that show whether the product is working?", "L": ["Can read a dashboard when someone shows which numbers matter.|opens the driver-app funnel dashboard and reads the drop-off rate once a teammate points to it.", "Tracks the core metrics of their own feature without being asked.|checks the failed-delivery retry rate every week for the feature they own.", "Diagnoses why a metric moved and specifies the events needed to decide.|traces a fall in COD collection to a missing 'cash confirmed' event and writes the tracking spec to capture it.", "Connects metrics others treat separately and raises the team's data literacy.|links rising pickup delays to a hub-sorting change and shows the team how to read the two together.", "Sets how the whole team uses data to drive design.|defines the standard set of metrics every squad reviews before and after a launch."]}, {"order": 3, "skill": "System & service", "domain": "Product", "track": "Universal", "definition": "Understanding the end-to-end operational service behind a feature: pickup, hub, last mile, failed delivery, and COD, not just the screens.", "summary": "Can you see the whole delivery journey behind the screen you're designing?", "L": ["Understands the screens but not the operational flow behind them.|designs the tracking page without knowing what triggers each status.", "Can map the end-to-end service for their own feature.|draws the full path a parcel takes for the flow they own.", "Designs for real operational edge cases.|handles failed delivery, re-attempt, and return-to-seller in one coherent flow.", "Improves cross-team service blueprints and spots systemic gaps.|finds where a handoff between hub and last mile drops parcel status.", "Defines how the team designs for the whole service, not just the UI.|makes service blueprinting a standard step before any flow is designed."]}, {"order": 4, "skill": "Product sense & strategy", "domain": "Product", "track": "Universal", "definition": "Judgment about what to build and why: framing opportunities, prioritizing, and tying design to business outcomes.", "summary": "Do you know what's worth building, and can you say why?", "L": ["Executes a defined scope with little framing of the problem.|builds the screens in the ticket without questioning the goal.", "Frames the opportunity for their own feature with some guidance.|reframes a 'redesign the tracking page' task around reducing 'where is my parcel' tickets.", "Prioritizes independently and ties design to business outcomes.|sequences the failed-delivery work to cut re-delivery cost first.", "Shapes the squad's strategy and sharpens how others prioritize.|reshapes the roadmap around the highest-cost delivery failures.", "Sets product-design strategy that influences the roadmap.|defines the experience bets the team commits to for the year."]}, {"order": 5, "skill": "UX", "domain": "Design", "track": "Universal", "definition": "The thinking craft behind an interface: the flows, structure, and interactions that let someone finish a task, accessible to everyone by default.", "summary": "Can you design a flow people can actually complete, including people with disabilities?", "L": ["Applies existing patterns with guidance.|reuses the standard address-entry pattern in the shipper portal when told which one to use.", "Designs sound flows and structure for familiar problems on their own.|independently designs the flow for scheduling a pickup time.", "Solves unfamiliar UX problems, with accessibility built in from the start.|designs a new failed-delivery resolution flow that also works with a screen reader and one hand on a phone.", "Raises the quality of others' UX and sets the bar for interaction.|reviews a teammate's returns flow and reshapes it so drivers finish it in half the taps.", "Defines the team's UX principles and how interaction quality is judged.|writes the interaction guidelines every GHN app screen is measured against."]}, {"order": 6, "skill": "UI", "domain": "Design", "track": "Universal", "definition": "The visual craft: layout, hierarchy, type, colour and contrast, and polish.", "summary": "Does your work look clear, consistent, and finished?", "L": ["Uses components, but visual consistency still needs review.|builds a screen that works but misuses spacing and the type scale.", "Produces clean, on-system UI independently.|ships a dispatch screen that matches the design system without rework.", "High visual craft; hierarchy and contrast pass every time.|a dense driver-app screen still reads clearly at a glance in sunlight.", "Raises the team's visual bar and art-directs the work of others.|does a visual pass on a teammate's screen that lifts the whole flow.", "Owns the visual language and its standard.|defines how GHN product screens should look and feel."]}, {"order": 7, "skill": "Design System", "domain": "Design", "track": "Universal", "definition": "Consuming, extending, and governing the shared component and token system.", "summary": "Can you use the system well, and help it grow without breaking it?", "L": ["Uses components correctly with guidance.|picks the right button and input when shown where they live.", "Uses the system well and contributes small patterns.|adds a missing empty-state variant back to the library.", "Extends the system with sound token and component decisions.|designs a new status-chip component that fits the token scale.", "Governs contributions and keeps the system coherent across teams.|reviews proposed components and rejects near-duplicates.", "Defines design-system strategy and governance.|sets how the system is versioned, contributed to, and adopted."]}, {"order": 8, "skill": "Content", "domain": "Design", "track": "Universal", "definition": "UX writing and content design: clarity, voice, and error and empty states.", "summary": "Is your wording clear, consistent, and helpful at the hard moments?", "L": ["Writes basic UI copy that needs review.|labels a button 'Submit' where 'Schedule pickup' would be clearer.", "Writes clear, consistent microcopy independently.|names the tracking statuses in plain words a shipper understands.", "Strong voice and clarity across flows, including edge and error states.|writes a failed-delivery message that explains what happens next without blame.", "Coaches others on UX writing and sets content patterns.|creates the error-message pattern the team reuses.", "Defines the product's content and voice standard.|writes the voice-and-tone guide for all GHN products."]}, {"order": 9, "skill": "Prototype", "domain": "Design", "track": "Universal", "definition": "Choosing the right fidelity and building prototypes to test ideas, including in code where useful.", "summary": "Can you make something testable at the right level of realism, quickly?", "L": ["Builds simple click-throughs with help.|links a few frames to show a happy path.", "Prototypes at the right fidelity to test a question independently.|builds a tappable pickup flow to test with drivers.", "Builds fast, realistic prototypes, including coded ones when needed.|codes a prototype that pulls sample parcel data to feel real.", "Raises the prototyping practice and mentors others on fidelity choices.|shows the team when a paper sketch beats a polished mockup.", "Defines how the team prototypes and validates.|sets the team's approach to what gets prototyped and how before build."]}, {"order": 10, "skill": "Research methods", "domain": "User", "track": "Universal", "definition": "Choosing and running the right kind of study to answer a question: picking the method, designing it, recruiting the right people, and facilitating well.", "summary": "Can you pick the right way to learn from users and run it without biasing the result?", "L": ["Helps on studies and follows a method someone else chose.|takes notes and helps recruit drivers for an interview a colleague designed.", "Runs familiar studies and picks a fitting method for the question.|chooses an unmoderated test to check whether shippers understand a new label.", "Designs rigorous studies and facilitates well even on unfamiliar topics.|designs field visits to observe how drivers handle failed deliveries in real conditions.", "Improves how others design studies and sets method standards.|reviews a teammate's survey and removes leading questions before it ships.", "Defines the research methodology the team uses.|establishes when the team runs discovery, evaluative, and continuous research, and how."]}, {"order": 11, "skill": "Analysis & synthesis", "domain": "User", "track": "Universal", "definition": "Turning raw data into trustworthy themes, respecting both qualitative and quantitative rigor.", "summary": "Can you turn messy findings into conclusions you can trust?", "L": ["Summarizes findings with guidance.|lists what interviewees said without grouping it.", "Themes qualitative data independently.|groups driver interviews into a few clear pain themes.", "Synthesizes rigorously and respects quantitative limits.|resists over-reading a 12-person survey and says so.", "Coaches analytical rigor and catches weak inference in others' work.|points out that a correlation in the data isn't the cause claimed.", "Sets the standard for evidence and synthesis.|defines how the team separates signal from noise in research."]}, {"order": 12, "skill": "Measurement & CX", "domain": "User", "track": "Universal", "definition": "Designing ongoing measurement of experience: CSAT, NPS, CES, survey triggers, and event specs.", "summary": "Can you set up trustworthy ways to measure how the experience is doing?", "L": ["Aware of CSAT and NPS but needs help to set them up.|knows the team runs CSAT but not how it is triggered.", "Sets up basic surveys and tracking for their own work.|adds a short CSAT after the pickup-booking flow.", "Designs sound measurement: triggers, timing, and event specs.|times a delivery-experience survey to fire after the parcel is received, not before.", "Architects CX measurement across features and coaches others.|designs one consistent CX metric set across the shipper and driver apps.", "Defines the CX-measurement framework for the team.|sets how GHN measures customer experience end to end."]}, {"order": 13, "skill": "Insight & recommendation", "domain": "User", "track": "Universal", "definition": "Turning findings into decisions: recommendations that change what the team actually does.", "summary": "Do your findings change what the team decides to do?", "L": ["Reports observations without clear recommendations.|says users struggled, but not what to do about it.", "Turns findings into actionable recommendations independently.|recommends a specific fix to the confusing tracking status.", "Makes recommendations that drive decisions and tie insight to outcomes.|links a research finding to a roadmap change the squad accepts.", "Elevates how others tell the insight-to-impact story.|helps a teammate reframe findings so leadership acts on them.", "Defines how research influences product decisions.|builds the way research is brought into planning across the team."]}, {"order": 14, "skill": "AI fluency & adoption", "domain": "Tech", "track": "Universal", "definition": "How deeply AI is used in the craft, from everyday assistance to building automated, agent-based workflows, with judgment about output quality.", "summary": "How much does AI multiply your work, and can you tell when its output is good enough?", "L": ["Uses AI for basic daily tasks such as chat and drafting.|drafts UX copy variations for a tracking screen with an AI assistant.", "Uses AI reliably across daily design work.|routinely uses AI to summarize support tickets before a design review.", "Uses AI inside core craft and judges the quality of the output.|generates a coded prototype of the pickup flow with AI and catches where it invented a wrong state.", "Builds workflows, uses agents and MCP, and coaches the team.|sets up an AI workflow that turns raw research notes into tagged themes and teaches the team to use it.", "Architects AI-augmented workflows such as harnesses and evals for the team.|designs the team's system for checking AI output quality before it is trusted in production work."]}, {"order": 15, "skill": "Technical constraints", "domain": "Tech", "track": "Universal", "definition": "Understanding feasibility and the stack well enough to design buildable work and collaborate with engineers.", "summary": "Do you design things that can actually be built, and work well with engineers?", "L": ["Aware that feasibility limits exist.|knows some things are 'hard' but not why.", "Understands their own stack's constraints and hands off cleanly.|designs within what the driver app's framework supports.", "Designs within constraints and collaborates strongly with engineers.|adjusts a flow when an engineer flags an API limit, keeping the intent.", "Advises on feasibility trade-offs and improves handoff quality.|proposes a phased build that ships value before the hard part.", "Sets the design-engineering collaboration standard.|defines how design and engineering hand off across the team."]}, {"order": 16, "skill": "Stakeholder comms", "domain": "Influence", "track": "Universal", "definition": "Aligning people around the work: presenting, persuading with evidence, and handling disagreement.", "summary": "Can you bring people along, and hold your ground with evidence?", "L": ["Communicates within the team with guidance.|shares work in the squad channel when prompted.", "Presents their own work clearly to peers and PMs.|walks the squad through a flow and the reasoning behind it.", "Aligns cross-functional stakeholders using evidence.|uses failed-delivery data to win agreement from ops and product.", "Influences leadership and coaches others' communication.|gets a director to back a direction, and helps a teammate do the same.", "Sets how the team communicates and aligns.|defines how design reviews and decisions are run across the team."]}, {"order": 17, "skill": "Mentorship", "domain": "Influence", "track": "Universal", "definition": "Growing other designers through feedback, coaching, and sponsorship.", "summary": "Do you actively make the designers around you better?", "L": ["Shares knowledge informally when asked.|answers a teammate's Figma question.", "Supports peers on familiar topics.|pairs with a junior on a flow they have done before.", "Actively grows others and gives structured, specific feedback.|runs regular crit that visibly improves a teammate's work.", "Develops multiple designers and visibly elevates their work.|coaches two designers whose craft levels up over a quarter.", "Builds the team's growth and mentoring culture.|sets up the crit and feedback rituals the team runs."]}, {"order": 18, "skill": "Systems & standards", "domain": "Influence", "track": "IC-leaning", "definition": "Leading through reusable standards and patterns rather than through people, the IC form of leadership.", "summary": "Do you make the whole team better by building standards, not by managing people?", "L": ["Follows team standards.|uses the existing handoff checklist.", "Applies standards consistently and suggests improvements.|proposes a small addition to the QA checklist.", "Creates reusable standards for their own area.|writes the pattern for how delivery statuses are named and shown.", "Drives adoption of standards across squads.|gets multiple squads to adopt one status-handling pattern.", "Defines org-wide design standards.|owns the standards that shape how the whole team works."]}, {"order": 19, "skill": "People leadership", "domain": "Influence", "track": "Management", "definition": "Leading through people rather than through the work itself: managing designers, hiring, and owning their performance and growth. This is the management track and is not expected on the IC track.", "summary": "Are you responsible for other people's performance, growth, and careers?", "L": ["Early exposure, or not applicable on the IC track.|an IC designer who occasionally guides an intern informally.", "Leads a small initiative or mentors an intern.|owns the onboarding of one new designer for a quarter.", "Leads projects and coordinates people informally.|runs a cross-squad design initiative, coordinating three designers without being their manager.", "Manages designers and owns their performance and growth.|holds regular one-on-ones, sets goals, and writes performance reviews for two designers.", "Builds and leads the design organization.|shapes the team's headcount plan, hiring bar, and career framework."]}], "roleOptions": ["Product Designer", "User Researcher"], "levelOptions": ["Associate", "Middle", "Senior", "Principal", "Lead (people mng.)"], "profiles": {"Product Designer|Associate": {"title": "Product Designer I", "cur": [2, 2, 2, 2, 3, 3, 2, 2, 3, 2, 2, 1, 2, 2, 2, 2, 1, 1, 1]}, "Product Designer|Middle": {"title": "Product Designer II", "cur": [3, 3, 3, 3, 4, 4, 3, 3, 4, 2, 2, 2, 3, 3, 3, 3, 2, 2, 1]}, "Product Designer|Senior": {"title": "Senior Product Designer I", "cur": [4, 4, 4, 4, 5, 4, 4, 4, 5, 3, 3, 3, 4, 4, 4, 4, 3, 3, 2]}, "Product Designer|Principal": {"title": "Principal Product Designer (IC)", "cur": [5, 5, 5, 5, 5, 5, 5, 5, 5, 4, 4, 4, 4, 5, 5, 4, 3, 5, 2]}, "Product Designer|Lead (people mng.)": {"title": "Design Lead", "cur": [4, 4, 4, 4, 5, 4, 4, 3, 4, 4, 4, 3, 4, 4, 4, 4, 4, 4, 4]}, "User Researcher|Associate": {"title": "Associate User Researcher", "cur": [2, 2, 2, 2, 2, 1, 1, 2, 1, 3, 3, 2, 3, 2, 2, 2, 1, 1, 1]}, "User Researcher|Middle": {"title": "User Researcher", "cur": [3, 3, 2, 2, 2, 1, 1, 2, 1, 4, 4, 3, 4, 3, 2, 3, 2, 2, 1]}, "User Researcher|Senior": {"title": "Senior User Researcher", "cur": [4, 4, 3, 3, 3, 2, 2, 3, 2, 5, 5, 4, 5, 4, 3, 4, 3, 3, 2]}, "User Researcher|Principal": {"title": "Principal User Researcher (IC)", "cur": [4, 5, 4, 4, 3, 2, 2, 3, 2, 5, 5, 5, 5, 4, 4, 4, 3, 5, 2]}}};
const SK=DATA.skills, N=SK.length, MAX=5;
const LEVELS=DATA.levels, LMEAN=DATA.levelMeaning, DOMAINS=DATA.domains;
const domColor={}; DOMAINS.forEach(d=>domColor[d.name]=d.color);
const PROF=DATA.profiles, ROLE_OPTS=DATA.roleOptions, LEVEL_OPTS=DATA.levelOptions;
const cx=380,cy=380,R=205,rIn=34,slice=360/N,ring=(R-rIn)/MAX;
let fRole=ROLE_OPTS[0], fLevel='Senior', selected=null, clickTimer=null;

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pol(r,deg){const a=deg*Math.PI/180;return [cx+r*Math.sin(a),cy-r*Math.cos(a)];}
function annular(ri,ro,a1,a2){const p1=pol(ro,a1),p2=pol(ro,a2),p3=pol(ri,a2),p4=pol(ri,a1);const la=(a2-a1)>180?1:0;
 return `M${p1[0].toFixed(1)} ${p1[1].toFixed(1)} A${ro} ${ro} 0 ${la} 1 ${p2[0].toFixed(1)} ${p2[1].toFixed(1)} L${p3[0].toFixed(1)} ${p3[1].toFixed(1)} A${ri} ${ri} 0 ${la} 0 ${p4[0].toFixed(1)} ${p4[1].toFixed(1)} Z`;}

function splitLabel(name){ if(name.length<=20) return [name]; const mid=name.length/2; let best=-1,bd=99;
  for(let p=0;p<name.length;p++){ if(name[p]===' '){const d=Math.abs(p-mid); if(d<bd){bd=d;best=p;}} }
  if(best<0) return [name]; return [name.slice(0,best), name.slice(best+1)]; }

function drawChart(){
 const host=document.getElementById('chart'), grid=cssbg(), text='#09090b';
 const prof=profile(); let s='';
 for(let i=0;i<N;i++){const a1=i*slice-slice/2,a2=i*slice+slice/2,col=domColor[SK[i].domain];
   const op = selected===null?1:(i===selected?1:0.28);

   if(prof){const lv=prof.cur[i]; if(lv>0){const ro=rIn+lv*ring; s+=`<path d="${annular(rIn,ro,a1,a2)}" fill="${col}" opacity="${i===selected?0.95:0.8}"/>`;}}
   s+=`<path d="${annular(rIn,R,a1,a2)}" fill="transparent" style="cursor:pointer"/></g>`;}
 for(let k=0;k<=MAX;k++){const rr=rIn+k*ring; s+=`<circle cx="${cx}" cy="${cy}" r="${rr.toFixed(1)}" fill="none" stroke="${grid}" stroke-width="${(k===0||k===MAX)?1.6:1}" opacity="0.85"/>`;}
 for(let i=0;i<N;i++){const ang=i*slice-slice/2,p1=pol(rIn,ang),p2=pol(R,ang); s+=`<line x1="${p1[0].toFixed(1)}" y1="${p1[1].toFixed(1)}" x2="${p2[0].toFixed(1)}" y2="${p2[1].toFixed(1)}" stroke="${grid}" stroke-width="1" opacity="0.7"/>`;}
 s+=`<circle cx="${cx}" cy="${cy}" r="${rIn}" fill="${cssel()}" stroke="${grid}" stroke-width="1.6"/>`;
 DOMAINS.forEach(d=>{const a1=d.start*slice-slice/2,a2=d.end*slice+slice/2; s+=`<path d="${annular(R+2,R+9,a1,a2)}" fill="${d.color}" opacity="0.9"/>`;});
 [0,4,9,13,15].forEach(k=>{const ang=k*slice-slice/2,p1=pol(rIn,ang),p2=pol(R+9,ang); s+=`<line x1="${p1[0].toFixed(1)}" y1="${p1[1].toFixed(1)}" x2="${p2[0].toFixed(1)}" y2="${p2[1].toFixed(1)}" stroke="${cssbg()}" stroke-width="3"/>`;});
 if(selected!==null){const a1=selected*slice-slice/2,a2=selected*slice+slice/2; s+=`<path d="${annular(rIn,R,a1,a2)}" fill="none" stroke="${domColor[SK[selected].domain]}" stroke-width="3" stroke-linejoin="round"/>`;}
 for(let i=0;i<N;i++){const ang=i*slice,lp=pol(R+14,ang); let rot=ang-90,anc='start'; if(rot>90&&rot<270){rot+=180;anc='end';}
   const on=selected===i, col=on?domColor[SK[i].domain]:text, lines=splitLabel(SK[i].skill);
   s+=`<g class="lblg" data-i="${i}" style="cursor:pointer;opacity:${selected===null?1:(on?1:0.28)};transition:opacity .12s"><text x="${lp[0].toFixed(1)}" y="${lp[1].toFixed(1)}" transform="rotate(${rot.toFixed(1)} ${lp[0].toFixed(1)} ${lp[1].toFixed(1)})" text-anchor="${anc}" dominant-baseline="middle" font-size="12" font-weight="${on?800:600}" fill="${col}">`;
   if(lines.length===1){s+=`<tspan x="${lp[0].toFixed(1)}">${esc(lines[0])}</tspan>`;}
   else{s+=`<tspan x="${lp[0].toFixed(1)}" dy="-0.35em">${esc(lines[0])}</tspan><tspan x="${lp[0].toFixed(1)}" dy="1.15em">${esc(lines[1])}</tspan>`;}
   s+=`</text></g>`;}
 host.innerHTML=`<svg viewBox="0 0 760 760" width="100%" style="max-width:600px;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">${s}</svg>`;
 attachHover();
}
function cssbg(){return getComputedStyle(document.documentElement).getPropertyValue('--bg-app').trim();}
function cssel(){return getComputedStyle(document.documentElement).getPropertyValue('--bg-elevated').trim();}

function setHover(i){document.querySelectorAll('#chart .skg, #chart .lblg').forEach(x=>{const j=+x.dataset.i;
  x.style.opacity = i!==null ? (j===i?'1':'0.15') : (selected===null?'1':(j===selected?'1':'0.28'));});}
function attachHover(){const tip=document.getElementById('tip'), wrap=document.querySelector('.chartwrap');
 function showTip(i){const sk=SK[i],prof=profile(),cur=prof?prof.cur[i]:null,dcol=domColor[sk.domain];
   let h=`<div class="tiphead"><div class="tiptitle">${esc(sk.skill)}</div><div class="tipdom" style="color:${dcol}">${sk.domain}</div><div class="tipsum">${esc(sk.summary)}</div>${barsHTML(cur,dcol)}</div>`;
   if(cur){h+=`<div class="tipcur" style="background:${dcol}">Level ${cur} of 5 &middot; ${LEVELS[cur-1]}: ${esc(sentence(i,cur-1))}</div>`;}
   tip.innerHTML=h; tip.style.display='block';}
 function moveTip(e){const r=wrap.getBoundingClientRect(),tw=tip.offsetWidth,th=tip.offsetHeight;
   let x=e.clientX-r.left+16; if(x+tw>r.width)x=e.clientX-r.left-tw-16; if(x<2)x=2;
   let y=e.clientY-r.top+16; if(y+th>r.height)y=r.height-th-2; if(y<2)y=2; tip.style.left=x+'px'; tip.style.top=y+'px';}
 document.querySelectorAll('#chart .skg, #chart .lblg').forEach(g=>{const i=+g.dataset.i;
   g.addEventListener('mouseenter',()=>{setHover(i);showTip(i);});
   g.addEventListener('mousemove',moveTip);
   g.addEventListener('mouseleave',()=>{setHover(null);tip.style.display='none';});
   g.addEventListener('click',()=>{ if(clickTimer){return;} clickTimer=setTimeout(()=>{clickTimer=null;selectSkill(i);},220); });
   g.addEventListener('dblclick',()=>{ if(clickTimer){clearTimeout(clickTimer);clickTimer=null;} deselect(); });
 });
}
window.selectSkill=function(i){selected=i;drawChart();renderDetail();
 const d=document.getElementById('detail'); const r=d.getBoundingClientRect();
 if(r.top>window.innerHeight-90||r.bottom<60){showToast('Scroll down for details \u2193');}};
function deselect(){selected=null;drawChart();renderDetail();}
let toastT=null;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
 if(toastT)clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600);}

function renderDetail(){const d=document.getElementById('detail');
 if(selected===null){let h=`<h2 class="dtitle" style="font-size:16px;line-height:24px">Domains &amp; criteria</h2><p class="hint">The 19 skills grouped by domain. Hover the radar for a quick look, or pick a skill here.</p>`;
   DOMAINS.forEach(dm=>{h+=`<div class="domgroup"><span class="domname" style="color:${dm.color}"><span class="domdot" style="background:${dm.color}"></span>${dm.name}</span><span class="chips">`;
     for(let i=dm.start;i<=dm.end;i++){h+=`<button class="chip" onclick="selectSkill(${i})">${esc(SK[i].skill)}</button>`;} h+=`</span></div>`;});
   d.innerHTML=h; return;}
 const sk=SK[selected],dcol=domColor[sk.domain],prof=profile(),cur=prof?prof.cur[selected]:null;
 let h=`<div class="dhead"><h2 class="dtitle">${esc(sk.skill)}</h2><button class="clear" onclick="deselect()">Clear \u2715</button></div>`;
 h+=`<div style="margin:6px 0 0"><span class="badge" style="background:${dcol}1f;color:${dcol}">${sk.domain}</span> <span class="badge" style="background:var(--bg-elevated);color:var(--muted)">${sk.track}</span></div>`;
 h+=`<p class="ddef">${esc(sk.definition)}</p><p class="dsum">${esc(sk.summary)}</p>`;
 if(cur){h+=`<div class="dcur" style="background:${dcol}">${barsHTML(cur,'#ffffff',22)}<div><div style="font-weight:800">Current for ${esc(prof.title)}</div><div style="font-size:12px;opacity:.92">Level ${cur} of 5 &middot; ${LEVELS[cur-1]}</div></div></div>`;}
 for(let k=0;k<MAX;k++){const on=cur&&(k+1)===cur;
   h+=`<div class="lv ${on?'lvon':''}" style="${on?`background:${dcol}1f`:''}"><div class="lvtop"><span class="lvnum" style="color:${dcol}">LEVEL ${k+1}</span><span class="lvname">${LEVELS[k]}</span></div>`;
   h+=`<div class="lvsent">${esc(sentence(selected,k))}</div>`;
   const ex=example(selected,k); if(ex)h+=`<div class="lvex"><b>GHN example:</b> ${esc(ex)}</div>`;
   h+=`</div>`;}
 d.innerHTML=h;}

function fillSelect(id,opts,val){const el=document.getElementById(id);el.innerHTML='';opts.forEach(o=>{const op=document.createElement('option');op.value=o;op.textContent=o;if(o===val)op.selected=true;el.appendChild(op);});}
function availableLevels(role){return LEVEL_OPTS.filter(l=>PROF[role+'|'+l]);}
function refreshLevels(){const av=availableLevels(fRole); if(!av.includes(fLevel))fLevel=av[0]; fillSelect('fLevel',av,fLevel);}
function onRole(){fRole=document.getElementById('fRole').value;refreshLevels();selected=null;drawChart();renderDetail();}
function onLevel(){fLevel=document.getElementById('fLevel').value;selected=null;drawChart();renderDetail();}
function build(){
 fillSelect('fRole',ROLE_OPTS,fRole);refreshLevels();
 document.getElementById('fRole').onchange=onRole;document.getElementById('fLevel').onchange=onLevel;
 document.getElementById('domlegend').innerHTML=DOMAINS.map(d=>`<span style="color:${d.color}"><i style="background:${d.color}"></i>${d.name}</span>`).join('');
 document.getElementById('foot').innerHTML='5 domains, 19 skills, scale 1 to 5. Content is authored in Notion and generated into this dashboard. Styled with the GHN design system.';
 drawChart();renderDetail();}
build();
</script>
</body>
</html>
